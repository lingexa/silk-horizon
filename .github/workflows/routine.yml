name: routine

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download history
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: across-word-history
          path: output/history/
      - name: Initialize history
        run: |
          mkdir -p output/history
          if [ ! -f "output/history/all_generated_pairs.json" ]; then
            echo '{"pairs": [], "last_updated": null}' > output/history/all_generated_pairs.json
          fi
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto fonts-noto-core fonts-liberation
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f "upload/requirements.txt" ]; then pip install -r upload/requirements.txt; fi
      - name: Create .env from secrets
        run: |
          echo "POLLINATIONS_API_KEY=${{ secrets.POLLINATIONS_API_KEY }}" >> .env
          echo "AI_MODEL=gemini-fast" >> .env
          echo "YT_CLIENT_ID=${{ secrets.YT_CLIENT_ID }}" >> .env
          echo "YT_CLIENT_SECRET=${{ secrets.YT_CLIENT_SECRET }}" >> .env
          echo "YT_REFRESH_TOKEN=${{ secrets.YT_REFRESH_TOKEN }}" >> .env
          echo "INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}" >> .env
          echo "INSTAGRAM_ACCOUNT_ID=${{ secrets.INSTAGRAM_ACCOUNT_ID }}" >> .env
          echo "FACEBOOK_ACCESS_TOKEN=${{ secrets.FACEBOOK_ACCESS_TOKEN }}" >> .env
          echo "FACEBOOK_PAGE_ID=${{ secrets.FACEBOOK_PAGE_ID }}" >> .env
      - name: Generate Content
        run: python lingexa_across_bot.py
      - name: Upload to Social Media
        run: |
          export PYTHONPATH="${{ github.workspace }}:${{ github.workspace }}/upload:$PYTHONPATH"
          python upload_all_platforms.py
      - name: Upload history
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: across-word-history
          path: output/history/all_generated_pairs.json
          retention-days: 90
          overwrite: true
      - name: Commit history
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f output/history/all_generated_pairs.json
          if ! git diff --staged --quiet; then
            git commit -m "Update pair history - Run #${{ github.run_number }}"
            git push
          fi
